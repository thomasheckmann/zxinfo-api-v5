name: Publish Swagger Docs

on:
  push:
    branches:
      - main
      - feature/v5
    paths:
      - "v5/swagger.yml"
      - "docs/index.html"
      - ".github/workflows/publish-swagger.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync OpenAPI spec to docs
        run: cp v5/swagger.yml docs/swagger.yml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
